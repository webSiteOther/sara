<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة سارة - إدارة الحسابات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="loader" class="fixed inset-0 bg-white/90 z-[100] flex flex-col items-center justify-center hidden">
    <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="font-bold text-indigo-600">جاري الاتصال بالشيت يا سارة...</p>
</div>

<header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
    <h1 class="text-xl font-bold">أهلاً سارة 👋</h1>
    <div class="text-xs bg-indigo-800 px-3 py-1 rounded-full border border-indigo-400">البيانات تُحفظ تلقائياً</div>
</header>

<div class="flex h-[calc(100-64px)] overflow-hidden">
    <aside class="w-64 bg-white border-l border-slate-200 p-4 overflow-y-auto">
        <button onclick="openModal('spec')" class="w-full bg-indigo-50 text-indigo-600 p-3 rounded-xl mb-4 font-bold hover:bg-indigo-100 transition">+ إضافة متخصص</button>
        <div id="spec-list" class="space-y-2">
            </div>
    </aside>

    <main id="main-content" class="flex-1 p-8 overflow-y-auto">
        <div id="empty-state" class="text-center mt-20 opacity-50">
            <h2 class="text-2xl font-bold">اختاري متخصصاً لبدء إدارة الحسابات</h2>
        </div>

        <div id="spec-details" class="hidden animate-fade space-y-6">
            <div class="flex justify-between items-center">
                <h2 id="active-spec-name" class="text-3xl font-black"></h2>
                <button onclick="deleteSpec()" class="text-red-500 text-sm font-bold">حذف المختص نهائياً</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold mb-4 text-indigo-600 border-b pb-2">إضافة تاسك</h3>
                    <div class="space-y-3">
                        <input type="text" id="t-name" placeholder="اسم التاسك" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:border-indigo-500">
                        <input type="number" id="t-amount" placeholder="المبلغ" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:border-indigo-500">
                        <input type="date" id="t-date" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:border-indigo-500">
                        <button onclick="addTask()" class="w-full bg-indigo-600 text-white p-2 rounded-lg font-bold">حفظ التاسك</button>
                    </div>
                    <div class="mt-6 overflow-x-auto">
                        <table class="w-full text-right text-sm">
                            <thead class="bg-slate-50 text-slate-400">
                                <tr><th class="p-2">التاسك</th><th class="p-2">المبلغ</th><th class="p-2"></th></tr>
                            </thead>
                            <tbody id="tasks-table"></tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="bg-indigo-900 text-white p-6 rounded-3xl shadow-xl">
                        <p class="text-indigo-300 text-sm">الرصيد المتبقي</p>
                        <h4 id="balance-display" class="text-4xl font-black my-4">0.00 ج.م</h4>
                        <button onclick="openModal('pay')" class="w-full bg-white text-indigo-900 p-3 rounded-xl font-bold">دفع حساب</button>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="font-bold mb-4">سجل المدفوعات</h3>
                        <div id="pay-log" class="space-y-2 text-sm max-h-40 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modal-spec" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl">
        <h3 class="text-xl font-bold mb-4">متخصص جديد</h3>
        <input type="text" id="new-spec-name" placeholder="اسم الشخص" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-100">
        <div class="flex gap-2">
            <button onclick="addSpec()" class="flex-1 bg-indigo-600 text-white p-3 rounded-xl font-bold">حفظ</button>
            <button onclick="closeModals()" class="flex-1 bg-slate-100 p-3 rounded-xl">إلغاء</button>
        </div>
    </div>
</div>

<div id="modal-pay" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl">
        <h3 class="text-xl font-bold mb-4">تسجيل دفعة</h3>
        <input type="number" id="pay-val" placeholder="المبلغ المدفوع" class="w-full p-3 border rounded-xl mb-4">
        <input type="text" id="pay-n" placeholder="ملاحظة" class="w-full p-3 border rounded-xl mb-4">
        <div class="flex gap-2">
            <button onclick="addPay()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold">تأكيد الخصم</button>
            <button onclick="closeModals()" class="flex-1 bg-slate-100 p-3 rounded-xl">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // ضعي رابط الـ Deployment الجديد هنا يا سارة
    const URL = "https://script.google.com/macros/s/AKfycbxTf2rwIlNlDIepZek_XXB3Gh5VWjVUokCEIAu-i4pUzdlC-cjJAcotFDAAle_NtG13Xg/exec";

    let db = { specialists: [], tasks: [], payments: [] };
    let currentId = null;

    async function api(action, data = {}) {
        toggleLoader(true);
        try {
            if (action === 'get_all') {
                const res = await fetch(URL + '?action=get_all');
                db = await res.json();
            } else {
                await fetch(URL, { method: 'POST', body: JSON.stringify({ action, ...data }) });
                const res = await fetch(URL + '?action=get_all');
                db = await res.json();
            }
            render();
        } catch (e) { alert("حدث خطأ في الاتصال بالشيت. تأكدي من الأذونات."); }
        toggleLoader(false);
    }

    function render() {
        // قائمة المختصين
        const list = document.getElementById('spec-list');
        list.innerHTML = db.specialists.map(s => `
            <button onclick="select('${s.id}')" class="w-full text-right p-3 rounded-xl transition ${currentId == s.id ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-50 text-slate-600'}">
                ${s.name}
            </button>
        `).join('');

        if (currentId) {
            const spec = db.specialists.find(s => s.id == currentId);
            if (!spec) { currentId = null; render(); return; }

            document.getElementById('spec-details').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-spec-name').innerText = spec.name;

            const sTasks = db.tasks.filter(t => t.specId == currentId);
            const sPays = db.payments.filter(p => p.specId == currentId);

            document.getElementById('tasks-table').innerHTML = sTasks.map(t => `
                <tr class="border-b border-slate-50">
                    <td class="p-2">${t.name}</td>
                    <td class="p-2 font-bold text-indigo-600">${t.amount}</td>
                    <td class="p-2"><button onclick="deleteTask('${t.id}')" class="text-red-300 hover:text-red-500">×</button></td>
                </tr>
            `).join('');

            document.getElementById('pay-log').innerHTML = sPays.map(p => `
                <div class="flex justify-between p-2 bg-slate-50 rounded border-r-2 border-green-500">
                    <span>${p.note} (${p.date})</span>
                    <span class="font-bold text-red-500">-${p.amount}</span>
                </div>
            `).join('');

            const total = sTasks.reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            const paid = sPays.reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            document.getElementById('balance-display').innerText = (total - paid).toLocaleString() + " ج.م";
        }
    }

    function select(id) { currentId = id; render(); }
    function openModal(id) { document.getElementById('modal-'+id).classList.remove('hidden'); }
    function closeModals() { document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden')); }
    function toggleLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

    function addSpec() {
        const name = document.getElementById('new-spec-name').value;
        if (!name) return;
        api('add_specialist', { id: Date.now().toString(), name });
        closeModals();
        document.getElementById('new-spec-name').value = "";
    }

    function addTask() {
        const name = document.getElementById('t-name').value;
        const amount = document.getElementById('t-amount').value;
        const date = document.getElementById('t-date').value;
        if (!name || !amount) return;
        api('add_task', { id: Date.now().toString(), specId: currentId, name, amount, date });
        document.getElementById('t-name').value = ""; document.getElementById('t-amount').value = "";
    }

    function addPay() {
        const val = document.getElementById('pay-val').value;
        const note = document.getElementById('pay-n').value;
        if (!val) return;
        api('add_payment', { id: Date.now().toString(), specId: currentId, amount: val, note: note || "دفعة", date: new Date().toLocaleDateString('en-GB') });
        closeModals();
        document.getElementById('pay-val').value = ""; document.getElementById('pay-n').value = "";
    }

    function deleteSpec() { if(confirm("حذف كل البيانات؟")) api('delete_specialist', { id: currentId }); }
    function deleteTask(id) { if(confirm("حذف التاسك؟")) api('delete_task', { id }); }

    window.onload = () => api('get_all');
</script>

</body>
</html>
